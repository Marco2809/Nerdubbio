# Apache VirtualHost per Nerdubbio (Nitro SSR + API PHP)
# Copia in /etc/apache2/sites-available/nerdubbio-cocoon.conf

<VirtualHost *:80>
    ServerName nerdubbio.cocoon-ms.it

    Alias /api /var/www/demos/nerdubbio/api
    <Directory /var/www/demos/nerdubbio/api>
        AllowOverride All
        Require all granted
        Options -Indexes
        DirectoryIndex index.php
    </Directory>

    ProxyPreserveHost On
    ProxyPass        /api !
    ProxyPass        / http://localhost:3002/
    ProxyPassReverse / http://localhost:3002/

    ErrorLog  ${APACHE_LOG_DIR}/nerdubbio_error.log
    CustomLog ${APACHE_LOG_DIR}/nerdubbio_access.log combined

    RewriteEngine on
    RewriteCond %{REMOTE_ADDR} !^127\.0\.0\.1$
    RewriteCond %{SERVER_NAME} =nerdubbio.cocoon-ms.it
    RewriteRule ^ https://%{SERVER_NAME}%{REQUEST_URI} [END,NE,R=permanent]
</VirtualHost>

# PM2: PORT=3002 pm2 start .output/server/index.mjs --name nerdubbio
